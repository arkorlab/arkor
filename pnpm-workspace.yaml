packages:
  - "packages/*"
  - "e2e/*"
  - "docs"
# Single source of truth for direct third-party dependency versions
# declared in workspace `package.json` files. Each such `package.json`
# references entries here as `"<name>": "catalog:"` so a bump is one
# line here instead of N parallel `package.json` edits prone to drift.
# Scope (intentional): only direct deps that stay inside the
# workspace; transitive deps fall back to the lockfile and the
# supply-chain guards above. Workspace-internal links (`workspace:*`)
# stay inline.
#
# Excluded: the published packages' runtime `dependencies`
# (`packages/arkor` and `packages/create-arkor`). Those keep literal
# semver because the release workflow publishes via `npm publish`
# (chosen so the npm CLI embeds `README.md` into the registry
# packument's `readme` field; see `.github/workflows/build.yaml`),
# and `npm publish` does not rewrite the pnpm-specific `catalog:`
# protocol, so consumers would see `EUNSUPPORTEDPROTOCOL`. Their
# `devDependencies` are unaffected: the field still ships in the
# published `package.json`, but consumer-side `npm install <pkg>`
# never installs a dependency's devDependencies, so `catalog:` there
# is never resolved at install time.
catalog:
  "@eslint/js": "^10.0.1"
  "@fontsource-variable/geist": "^5.1.0"
  "@fontsource-variable/geist-mono": "^5.1.0"
  "@playwright/test": "^1.50.0"
  "@stylistic/eslint-plugin": "^5.10.0"
  "@tailwindcss/vite": "^4.0.0"
  "@testing-library/jest-dom": "6.9.1"
  "@testing-library/react": "16.3.2"
  "@testing-library/user-event": "14.6.1"
  "@types/eslint-plugin-jsx-a11y": "^6.10.1"
  "@types/eslint-plugin-promise": "^7.3.0"
  "@types/node": "^24"
  "@types/react": "^19.0.0"
  "@types/react-dom": "^19.0.0"
  "@vitejs/plugin-react": "^4.3.0"
  "@vitest/coverage-v8": "^4.1.5"
  "@vitest/eslint-plugin": "^1.6.17"
  c8: "^10.1.3"
  eslint: "^10.4.0"
  eslint-import-resolver-typescript: "^4.4.4"
  eslint-plugin-import-x: "^4.16.2"
  eslint-plugin-jsx-a11y: "^6.10.2"
  eslint-plugin-n: "^18.0.1"
  eslint-plugin-promise: "^7.3.0"
  eslint-plugin-react-hooks: "^7.1.1"
  eslint-plugin-regexp: "^3.1.0"
  eslint-plugin-unicorn: "^64.0.0"
  eventsource-parser: "^3.0.0"
  globals: "^17.6.0"
  jsdom: 29.1.1
  mint: 4.2.577
  oxlint: 1.66.0
  react: "^19.0.0"
  react-dom: "^19.0.0"
  tailwindcss: "^4.0.0"
  tsdown: "^0.21.9"
  turbo: "^2.9.14"
  typescript: "^5"
  typescript-eslint: "^8.59.4"
  vite: "^6.0.0"
  vitest: "^4.1.5"
minimumReleaseAge: 1440
# Narrow exemption from the 24h release-age gate. Scope is intentionally
# this single package, and the entry should NOT grow without thinking
# through the trade-off below. The gate still applies to every other
# third-party dep as a normal supply-chain guard.
#
# Why exempt `@arkor/cloud-api-client`:
#   - It's our own package, published from this org's GitHub workflow
#     via npm Trusted Publishing (OIDC). There's no long-lived NPM_TOKEN
#     in CI / contributor secrets, so a malicious publish would require
#     compromising the workflow itself, not a leaked credential.
#   - The arkor SDK and the control-plane shape evolve together and we
#     iterate the client multiple times per day during alpha. Sitting
#     out 24h per publish would block this submodule's CI from picking
#     up the matching server contract.
#   - The package is private-org-scoped (`@arkor/`), so a typo-squat
#     under the same name would fail npm's scope ownership check.
#
# Trade-off: a successful workflow compromise (or an internal mistake
# that publishes to alpha) is consumable here within the same hour
# instead of after 24h of cool-down. Mitigations: GitHub branch
# protection on the publishing workflow + the trustPolicy below would
# still block a downgrade attack.
minimumReleaseAgeExclude:
  - "@arkor/cloud-api-client"
trustPolicy: no-downgrade
trustPolicyExclude:
  # Pulled in by @vitejs/plugin-react -> @babel/core for Studio UI builds.
  - 'semver@6.3.1'
# Block transitive deps from resolving via exotic sources (git+ssh://...,
# direct tarball URLs, etc.). Direct deps may still use exotic sources;
# only transitives are restricted, so the registry/lockfile/release-age
# guards above remain the trust boundary for everything we pull in
# indirectly. Kept explicit as policy, not as a temporary pin: pnpm 10.x
# is opt-in and pnpm 11 makes it the default, but we want the value
# co-located with the other supply-chain guards so reviewers see the
# stance in one place, and so the setting stays pinned if a future pnpm
# release walks the default back.
blockExoticSubdeps: true
# Transitive deps under `mint` (in `docs/`): each ships a postinstall
# (keytar's native binding, puppeteer's Chromium download, sharp's
# libvips binary). `false` is the deny choice: it suppresses pnpm
# 11's `ERR_PNPM_IGNORED_BUILDS` without granting any of them the
# right to run install-time code. The docs workflow has been running
# under pnpm 10's "warn-and-skip" behaviour without these
# postinstalls; pnpm 11 surfaces the same skip explicitly, and `false`
# preserves that posture. Flip an entry to `true` only if a concrete
# docs task starts failing because its native binary isn't there.
allowBuilds:
  rolldown: true
  unrs-resolver: true
  esbuild: true
  keytar: false
  puppeteer: false
  sharp: false
