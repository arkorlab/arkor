name: Release Dry Run

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag. Use auto unless you need to override."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - latest
          - alpha
          - beta
          - rc

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Same shape as release.yaml's preflight: all source-level validation
  # lives here. Duplication is intentional — see the comment at the top
  # of build.yaml.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
    steps:
      - name: Ensure workflow is running on a tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a Git tag ref."
            echo "Example:"
            echo "  gh workflow run release-dry-run.yaml --ref v1.2.3 -f npm_tag=auto"
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Tag must start with v, e.g. v1.2.3"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # No pnpm tooling on preflight. Mirrors release.yaml's preflight:
      # this job only validates tag shape, reconciles versions via
      # `node -p`, and probes npm for prior publishes, so
      # `pnpm/action-setup` (and any `cache: pnpm` question that comes
      # with it) is dead weight. Keeping the dry-run preflight
      # minimal. If a future preflight step needs pnpm, add the setup
      # step alongside it and consciously decide on the cache stance
      # at that point; the test job below mirrors release.yaml's
      # no-restored-cache rule.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'auto' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          ARKOR_VERSION="$(node -p "require('./packages/arkor/package.json').version")"
          CREATE_ARKOR_VERSION="$(node -p "require('./packages/create-arkor/package.json').version")"

          if [[ "$ARKOR_VERSION" != "$VERSION" ]]; then
            echo "packages/arkor/package.json version does not match tag"
            echo "package.json: $ARKOR_VERSION"
            echo "tag:          $VERSION"
            exit 1
          fi

          if [[ "$CREATE_ARKOR_VERSION" != "$VERSION" ]]; then
            echo "packages/create-arkor/package.json version does not match tag"
            echo "package.json: $CREATE_ARKOR_VERSION"
            echo "tag:          $VERSION"
            exit 1
          fi

          case "$VERSION" in
            *-alpha|*-alpha.*)
              EXPECTED_NPM_TAG="alpha"
              ;;
            *-beta|*-beta.*)
              EXPECTED_NPM_TAG="beta"
              ;;
            *-rc|*-rc.*)
              EXPECTED_NPM_TAG="rc"
              ;;
            *-*)
              echo "Unsupported prerelease version: $VERSION"
              echo "Allowed prerelease labels: alpha, beta, rc"
              exit 1
              ;;
            *)
              EXPECTED_NPM_TAG="latest"
              ;;
          esac

          if [[ "$INPUT_NPM_TAG" == "auto" ]]; then
            NPM_TAG="$EXPECTED_NPM_TAG"
          else
            NPM_TAG="$INPUT_NPM_TAG"
          fi

          if [[ "$NPM_TAG" != "$EXPECTED_NPM_TAG" ]]; then
            echo "npm_tag does not match version"
            echo "version:          $VERSION"
            echo "expected npm_tag: $EXPECTED_NPM_TAG"
            echo "actual npm_tag:   $NPM_TAG"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

          {
            echo "## Release Dry Run"
            echo ""
            echo "- Packages: \`arkor\`, \`create-arkor\`"
            echo "- Version: \`$VERSION\`"
            echo "- Git tag: \`${GITHUB_REF_NAME}\`"
            echo "- npm dist-tag: \`$NPM_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check npm versions are not published yet
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          for PKG in arkor create-arkor; do
            if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
              echo "$PKG@$VERSION is already published"
              exit 1
            fi
          done

  # Verifies the source on every tag push: packs, runs e2e against the
  # packed tarball, and exercises `pnpm publish --dry-run` to surface
  # `files:` / dist/ / package.json metadata regressions before the
  # maintainer manually triggers release.yaml. Does NOT call
  # build.yaml — the trusted builder is exercised only on real release.
  test:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      # No `cache: pnpm`. Same rationale as the preflight job above and
      # release.yaml's test job: dry-run runs the same pack/publish
      # shape that the trusted builder would, so the cache-poisoning
      # surface stays closed here too.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        # Belt-and-suspenders: pnpm-workspace.yaml's `allowBuilds`
        # already gates which packages may run postinstall, and
        # `playwright` is not in that list — so `pnpm install` won't
        # invoke Playwright's browser-download script today. Setting
        # `PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1` keeps that contract
        # explicit so a future `allowBuilds` change can't silently
        # re-enable a 150 MB postinstall download that would duplicate
        # (and obscure) the explicit `playwright install` step below.
        # That explicit step is the only place we want browser
        # installation to happen, and the dry-run path runs it
        # without restoring from a Playwright cache.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # The Test step below transitively runs `@arkor/e2e-studio#test`
      # (Playwright/Chromium), so we need the browser binaries on disk
      # before that. Dry-run mirrors release.yaml's no-cache stance:
      # this job pre-flights the same shape build.yaml would publish,
      # so we avoid a `~/.cache/ms-playwright` poisoning vector even
      # though dry-run never actually uploads. The dry-run `test` job
      # is Linux-only, so we always pass `--with-deps`.
      - name: Install Playwright (Linux)
        run: pnpm --filter @arkor/e2e-studio exec playwright install --with-deps chromium

      - name: Pack tarballs for e2e scaffold tests
        run: |
          PACK_DIR="$RUNNER_TEMP/npm-pack"
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"

          for PKG_DIR in packages/arkor packages/create-arkor; do
            (cd "$PKG_DIR" && pnpm pack --pack-destination "$PACK_DIR")
          done

          shopt -s nullglob
          ARKOR_TARBALLS=("$PACK_DIR"/arkor-*.tgz)
          shopt -u nullglob
          if [[ ${#ARKOR_TARBALLS[@]} -ne 1 ]]; then
            echo "Expected exactly one arkor-*.tgz in $PACK_DIR, got ${#ARKOR_TARBALLS[@]}"
            ls -la "$PACK_DIR" || true
            exit 1
          fi
          ARKOR_TARBALL="${ARKOR_TARBALLS[0]}"
          echo "ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC=file:$ARKOR_TARBALL" >> "$GITHUB_ENV"

      - name: Test
        env:
          ARKOR_POSTHOG_KEY: ${{ secrets.ARKOR_POSTHOG_KEY }}
          ARKOR_POSTHOG_HOST: ${{ secrets.ARKOR_POSTHOG_HOST }}
          # Disable runtime telemetry: `pnpm run test` triggers
          # `arkor#build` via Turbo's `^build` (e2e/cli now declares
          # `arkor` as a workspace devDependency), and that build
          # bakes the PostHog key into `dist/bin.mjs`. The tests then
          # spawn that binary, so without this flag every dry-run
          # would emit real PostHog events from CI.
          ARKOR_TELEMETRY_DISABLED: "1"
        run: pnpm run test

      # Publish from the package directory (not from the pre-Test pack)
      # so the dry-run exercises the dist/ shape the Build step produced
      # (and that Turbo may reuse during `pnpm test`), the same dist/ that
      # `pnpm publish` uploads during a real release (see
      # `.github/workflows/build.yaml`). This mirror also covers the
      # `embedReadme: true` packument injection, since the dry-run runs the
      # same native `pnpm publish` path.
      - name: Dry run publish (arkor)
        working-directory: packages/arkor
        run: |
          pnpm publish \
            --access public \
            --tag "${{ needs.preflight.outputs.npm_tag }}" \
            --no-git-checks \
            --dry-run

      - name: Dry run publish (create-arkor)
        working-directory: packages/create-arkor
        run: |
          pnpm publish \
            --access public \
            --tag "${{ needs.preflight.outputs.npm_tag }}" \
            --no-git-checks \
            --dry-run

      # Mirror the SBOM generation build.yaml runs for real (it attests and
      # attaches the output to the GitHub Release; here we only generate and
      # check). Running both formats on every tag push surfaces a
      # `pnpm sbom --prod` regression before a maintainer triggers
      # release.yaml. The version asserts fail if pnpm's emitted schema ever
      # drifts from what build.yaml and AGENTS.md promise (CycloneDX 1.7 /
      # SPDX 2.3). SPDX has no spec-version flag to pin, so this assert is
      # its only drift guard. `jq -er` doubles as the parse check that the
      # redirected stdout is the well-formed JSON pnpm validates internally.
      - name: Dry run generate release SBOMs (CycloneDX + SPDX)
        run: |
          SBOM_DIR="$RUNNER_TEMP/sbom"
          rm -rf "$SBOM_DIR"
          mkdir -p "$SBOM_DIR"

          pnpm sbom --sbom-format cyclonedx --sbom-spec-version 1.7 --prod > "$SBOM_DIR/sbom.cyclonedx.json"
          pnpm sbom --sbom-format spdx --prod > "$SBOM_DIR/sbom.spdx.json"

          CDX_VER="$(jq -er '.specVersion' "$SBOM_DIR/sbom.cyclonedx.json")"
          SPDX_VER="$(jq -er '.spdxVersion' "$SBOM_DIR/sbom.spdx.json")"
          test "$CDX_VER" = "1.7" || { echo "CycloneDX specVersion drifted: $CDX_VER (expected 1.7)"; exit 1; }
          test "$SPDX_VER" = "SPDX-2.3" || { echo "SPDX spdxVersion drifted: $SPDX_VER (expected SPDX-2.3)"; exit 1; }
