name: Release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - alpha
          - beta
          - rc

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    # npm Trusted Publisher 側で environment を指定するなら一致させる
    # environment: npm-publish

    steps:
      - name: Ensure workflow is running on a tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must be run on a Git tag ref."
            echo "Example:"
            echo "  gh workflow run release.yaml --ref v1.2.3 -f npm_tag=latest"
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Tag must start with v, e.g. v1.2.3"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NPM_TAG="${{ inputs.npm_tag }}"

          ARKOR_VERSION="$(node -p "require('./packages/arkor/package.json').version")"
          CREATE_ARKOR_VERSION="$(node -p "require('./packages/create-arkor/package.json').version")"

          if [[ "$ARKOR_VERSION" != "$VERSION" ]]; then
            echo "packages/arkor/package.json version does not match tag"
            echo "package.json: $ARKOR_VERSION"
            echo "tag:          $VERSION"
            exit 1
          fi

          if [[ "$CREATE_ARKOR_VERSION" != "$VERSION" ]]; then
            echo "packages/create-arkor/package.json version does not match tag"
            echo "package.json: $CREATE_ARKOR_VERSION"
            echo "tag:          $VERSION"
            exit 1
          fi

          case "$VERSION" in
            *-alpha|*-alpha.*)
              EXPECTED_NPM_TAG="alpha"
              ;;
            *-beta|*-beta.*)
              EXPECTED_NPM_TAG="beta"
              ;;
            *-rc|*-rc.*)
              EXPECTED_NPM_TAG="rc"
              ;;
            *-*)
              echo "Unsupported prerelease version: $VERSION"
              echo "Allowed prerelease labels: alpha, beta, rc"
              exit 1
              ;;
            *)
              EXPECTED_NPM_TAG="latest"
              ;;
          esac

          if [[ "$NPM_TAG" != "$EXPECTED_NPM_TAG" ]]; then
            echo "npm_tag does not match version"
            echo "version:          $VERSION"
            echo "expected npm_tag: $EXPECTED_NPM_TAG"
            echo "actual npm_tag:   $NPM_TAG"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

          {
            echo "## Release"
            echo ""
            echo "- Packages: \`arkor\`, \`create-arkor\`"
            echo "- Version: \`$VERSION\`"
            echo "- Git tag: \`${GITHUB_REF_NAME}\`"
            echo "- npm dist-tag: \`$NPM_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check npm versions are not published yet
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          for PKG in arkor create-arkor; do
            if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
              echo "$PKG@$VERSION is already published"
              exit 1
            fi
          done

      - name: Check GitHub Release does not exist yet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release already exists: $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          ARKOR_POSTHOG_KEY: ${{ secrets.ARKOR_POSTHOG_KEY }}
          ARKOR_POSTHOG_HOST: ${{ secrets.ARKOR_POSTHOG_HOST }}
        run: pnpm run build

      - name: Pack and inspect tarballs
        run: |
          PACK_DIR="$RUNNER_TEMP/npm-pack"
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"

          for PKG_DIR in packages/arkor packages/create-arkor; do
            (cd "$PKG_DIR" && pnpm pack --pack-destination "$PACK_DIR")
          done

          # Resolve the freshly-packed `arkor` tarball without hard-coding
          # the filename, then expose it to subsequent steps as a
          # `file:` spec so the e2e scaffold install tests use *this*
          # build instead of fetching `arkor` from the registry.
          shopt -s nullglob
          ARKOR_TARBALLS=("$PACK_DIR"/arkor-*.tgz)
          shopt -u nullglob
          if [[ ${#ARKOR_TARBALLS[@]} -ne 1 ]]; then
            echo "Expected exactly one arkor-*.tgz in $PACK_DIR, got ${#ARKOR_TARBALLS[@]}"
            ls -la "$PACK_DIR" || true
            exit 1
          fi
          ARKOR_TARBALL="${ARKOR_TARBALLS[0]}"
          echo "ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC=file:$ARKOR_TARBALL" >> "$GITHUB_ENV"

          for TARBALL in "$PACK_DIR"/*.tgz; do
            echo "## $(basename "$TARBALL")"
            tar -tf "$TARBALL"
          done

      - name: Generate GitHub artifact attestations for release tarballs
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/npm-pack/*.tgz

      - name: Test
        env:
          ARKOR_POSTHOG_KEY: ${{ secrets.ARKOR_POSTHOG_KEY }}
          ARKOR_POSTHOG_HOST: ${{ secrets.ARKOR_POSTHOG_HOST }}
          # Disable runtime telemetry: `pnpm run test` triggers the
          # e2e-cli pretest, which rebuilds `arkor` with the key baked
          # in. The tests then spawn that binary, so without this flag
          # every release run would emit real PostHog events from CI.
          ARKOR_TELEMETRY_DISABLED: "1"
        run: pnpm run test

      # Publish from the package directory (not from the pre-packed tarball)
      # so npm CLI reads README.md at publish time and embeds it in the
      # registry packument's `readme` field. `npm publish <tarball>` does
      # not perform that injection, which leaves the page on npmjs.com
      # blank.
      - name: Publish arkor to npm
        working-directory: packages/arkor
        run: |
          npm publish \
            --access public \
            --tag "${{ steps.meta.outputs.npm_tag }}" \
            --provenance

      - name: Publish create-arkor to npm
        working-directory: packages/create-arkor
        run: |
          npm publish \
            --access public \
            --tag "${{ steps.meta.outputs.npm_tag }}" \
            --provenance

      - name: Verify published packages
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          MAX_ATTEMPTS=120
          SLEEP_SECONDS=5
          for PKG in arkor create-arkor; do
            attempt=1
            while true; do
              RESOLVED="$(npm view "$PKG@$VERSION" version 2>/dev/null || true)"
              if [[ "$RESOLVED" == "$VERSION" ]]; then
                echo "$PKG@$VERSION verified"
                break
              fi
              if (( attempt >= MAX_ATTEMPTS )); then
                echo "Failed to verify $PKG@$VERSION after $MAX_ATTEMPTS attempts (last response: '${RESOLVED:-<empty>}')"
                exit 1
              fi
              echo "Attempt $attempt/$MAX_ATTEMPTS: $PKG@$VERSION not yet visible on registry, retrying in ${SLEEP_SECONDS}s..."
              attempt=$((attempt + 1))
              sleep "$SLEEP_SECONDS"
            done
          done

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PACK_DIR="$RUNNER_TEMP/npm-pack"

          ARGS=(
            "$GITHUB_REF_NAME"
            "$PACK_DIR"/*.tgz
            --draft
            --verify-tag
            --generate-notes
          )

          if [[ "$VERSION" == *"-"* ]]; then
            ARGS+=(--prerelease)
          fi

          gh release create "${ARGS[@]}"
