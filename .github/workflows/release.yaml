name: Release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - alpha
          - beta
          - rc

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # All source-level validation lives here so build.yaml stays minimal —
  # see the comment at the top of build.yaml. preflight is the gate that
  # decides whether the rest of the workflow may proceed; if any check
  # fails nothing else runs.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
    steps:
      - name: Ensure workflow is running on a tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must be run on a Git tag ref."
            echo "Example:"
            echo "  gh workflow run release.yaml --ref v1.2.3 -f npm_tag=latest"
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Tag must start with v, e.g. v1.2.3"
            exit 1
          fi

      - name: Check GitHub Release does not exist yet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release already exists: $GITHUB_REF_NAME"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          ARKOR_VERSION="$(node -p "require('./packages/arkor/package.json').version")"
          CREATE_ARKOR_VERSION="$(node -p "require('./packages/create-arkor/package.json').version")"

          if [[ "$ARKOR_VERSION" != "$VERSION" ]]; then
            echo "packages/arkor/package.json version does not match tag"
            echo "package.json: $ARKOR_VERSION"
            echo "tag:          $VERSION"
            exit 1
          fi

          if [[ "$CREATE_ARKOR_VERSION" != "$VERSION" ]]; then
            echo "packages/create-arkor/package.json version does not match tag"
            echo "package.json: $CREATE_ARKOR_VERSION"
            echo "tag:          $VERSION"
            exit 1
          fi

          case "$VERSION" in
            *-alpha|*-alpha.*)
              EXPECTED_NPM_TAG="alpha"
              ;;
            *-beta|*-beta.*)
              EXPECTED_NPM_TAG="beta"
              ;;
            *-rc|*-rc.*)
              EXPECTED_NPM_TAG="rc"
              ;;
            *-*)
              echo "Unsupported prerelease version: $VERSION"
              echo "Allowed prerelease labels: alpha, beta, rc"
              exit 1
              ;;
            *)
              EXPECTED_NPM_TAG="latest"
              ;;
          esac

          NPM_TAG="$INPUT_NPM_TAG"

          if [[ "$NPM_TAG" != "$EXPECTED_NPM_TAG" ]]; then
            echo "npm_tag does not match version"
            echo "version:          $VERSION"
            echo "expected npm_tag: $EXPECTED_NPM_TAG"
            echo "actual npm_tag:   $NPM_TAG"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

          {
            echo "## Release"
            echo ""
            echo "- Packages: \`arkor\`, \`create-arkor\`"
            echo "- Version: \`$VERSION\`"
            echo "- Git tag: \`${GITHUB_REF_NAME}\`"
            echo "- npm dist-tag: \`$NPM_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check npm versions are not published yet
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          for PKG in arkor create-arkor; do
            if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
              echo "$PKG@$VERSION is already published"
              exit 1
            fi
          done

  # Tests live outside the SLSA L3 trusted builder (build.yaml) so the
  # builder's trust boundary stays minimal. This job runs the
  # published-shape verification: pack the tarballs and point the e2e
  # scaffold tests at them via ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC, so any
  # `files:` / dist/ regression that would only surface post-pack is
  # caught before the build job signs and publishes.
  test:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install
        # Belt-and-suspenders: pnpm-workspace.yaml's `allowBuilds`
        # already gates which packages may run postinstall, and
        # `playwright` is not in that list — so `pnpm install` won't
        # invoke Playwright's browser-download script today. Setting
        # `PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1` keeps that contract
        # explicit so a future `allowBuilds` change can't silently
        # re-enable a 150 MB postinstall download that the following
        # cache + `playwright install` steps are meant to satisfy.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          ARKOR_POSTHOG_KEY: ${{ secrets.ARKOR_POSTHOG_KEY }}
          ARKOR_POSTHOG_HOST: ${{ secrets.ARKOR_POSTHOG_HOST }}
        run: pnpm run build

      # The Test step below transitively runs `@arkor/e2e-studio#test`
      # (Playwright/Chromium), so we need the browser binaries on disk
      # before that. Unlike ci.yaml, the release path intentionally
      # *does not* cache: a poisoned `~/.cache/ms-playwright` entry
      # would run inside the same job that pre-flights what build.yaml
      # is about to publish. The ~150 MB download per release is
      # cheaper than that supply-chain risk. The release `test` job is
      # Linux-only, so we always pass `--with-deps`.
      - name: Install Playwright (Linux)
        run: pnpm --filter @arkor/e2e-studio exec playwright install --with-deps chromium

      - name: Pack tarballs for e2e scaffold tests
        run: |
          PACK_DIR="$RUNNER_TEMP/npm-pack"
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"

          for PKG_DIR in packages/arkor packages/create-arkor; do
            (cd "$PKG_DIR" && pnpm pack --pack-destination "$PACK_DIR")
          done

          shopt -s nullglob
          ARKOR_TARBALLS=("$PACK_DIR"/arkor-*.tgz)
          shopt -u nullglob
          if [[ ${#ARKOR_TARBALLS[@]} -ne 1 ]]; then
            echo "Expected exactly one arkor-*.tgz in $PACK_DIR, got ${#ARKOR_TARBALLS[@]}"
            ls -la "$PACK_DIR" || true
            exit 1
          fi
          ARKOR_TARBALL="${ARKOR_TARBALLS[0]}"
          echo "ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC=file:$ARKOR_TARBALL" >> "$GITHUB_ENV"

      - name: Test
        env:
          ARKOR_POSTHOG_KEY: ${{ secrets.ARKOR_POSTHOG_KEY }}
          ARKOR_POSTHOG_HOST: ${{ secrets.ARKOR_POSTHOG_HOST }}
          # Disable runtime telemetry: `pnpm run test` triggers
          # `arkor#build` via Turbo's `^build` (e2e/cli now declares
          # `arkor` as a workspace devDependency), and that build
          # bakes the PostHog key into `dist/bin.mjs`. The tests then
          # spawn that binary, so without this flag every release run
          # would emit real PostHog events from CI.
          ARKOR_TELEMETRY_DISABLED: "1"
        run: pnpm run test

  # The trusted builder. Because `npm publish --provenance` runs inside
  # build.yaml, the OIDC token Sigstore signs has
  # `job_workflow_ref = .../build.yaml@<ref>` rather than this caller's
  # path — giving SLSA Build L3 verifiers a stable, separately-lockable
  # identity to pin.
  build:
    needs: [preflight, test]
    permissions:
      id-token: write
      attestations: write
    uses: ./.github/workflows/build.yaml
    with:
      npm_tag: ${{ needs.preflight.outputs.npm_tag }}
    secrets: inherit

  postflight:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify published packages
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          MAX_ATTEMPTS=120
          SLEEP_SECONDS=5
          for PKG in arkor create-arkor; do
            attempt=1
            while true; do
              RESOLVED="$(npm view "$PKG@$VERSION" version 2>/dev/null || true)"
              if [[ "$RESOLVED" == "$VERSION" ]]; then
                echo "$PKG@$VERSION verified"
                break
              fi
              if (( attempt >= MAX_ATTEMPTS )); then
                echo "Failed to verify $PKG@$VERSION after $MAX_ATTEMPTS attempts (last response: '${RESOLVED:-<empty>}')"
                exit 1
              fi
              echo "Attempt $attempt/$MAX_ATTEMPTS: $PKG@$VERSION not yet visible on registry, retrying in ${SLEEP_SECONDS}s..."
              attempt=$((attempt + 1))
              sleep "$SLEEP_SECONDS"
            done
          done

      - name: Download release tarballs
        uses: actions/download-artifact@v6
        with:
          name: npm-tarballs
          path: ${{ runner.temp }}/npm-pack

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          PACK_DIR="$RUNNER_TEMP/npm-pack"

          ARGS=(
            "$GITHUB_REF_NAME"
            "$PACK_DIR"/*.tgz
            --draft
            --verify-tag
            --generate-notes
            --repo "$GITHUB_REPOSITORY"
          )

          if [[ "$VERSION" == *"-"* ]]; then
            ARGS+=(--prerelease)
          fi

          gh release create "${ARGS[@]}"
