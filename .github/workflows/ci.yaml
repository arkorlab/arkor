name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: typecheck · test · build · ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    # Force bash on every OS so `run:` steps that use POSIX redirection (e.g.
    # `>> "$GITHUB_STEP_SUMMARY"`) work uniformly. windows-latest defaults to
    # pwsh otherwise. Git Bash ships on the GitHub-hosted Windows image.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        # Cross every Node entry below with all three GitHub-hosted OS images.
        # The Node matrix exists to surface strip-types / transform-types /
        # amaro behaviour shifts; running it on Linux + Windows + macOS also
        # catches platform-specific regressions in path handling, child
        # process spawning, and pnpm hardlink/symlink behaviour.
        os: [ubuntu-latest, windows-latest, macos-latest]

        # This matrix intentionally covers Node.js versions where built-in
        # TypeScript execution was experimental, so we can verify behavioral
        # differences across strip-types / transform-types / amaro changes.
        node:
          # Major: introduced --experimental-strip-types
          - '>=22.6.0 <22.7.0'     # .ts type stripping becomes available

          # Major: introduced --experimental-transform-types
          - '>=22.7.0 <22.8.0'     # supports TS syntax that requires transforms, such as enum

          - '>=22.8.0 <22.9.0'     # sourceURL / transform-related changes
          - '>=22.9.0 <22.10.0'    # amaro made externalizable
          - '>=22.10.0 <22.12.0'   # process.features.typescript / TS test runner changes
          - '>=22.12.0 <22.13.0'   # amaro updates
          - '>=22.13.0 <22.14.0'   # added module.stripTypeScriptTypes

          # Major: TypeScript support for eval / worker input and error classification
          - '>=22.14.0 <22.15.0'   # STDIN eval / worker eval TS input / ERR_UNSUPPORTED_TYPESCRIPT_SYNTAX

          - '>=22.15.0 <22.17.0'   # amaro update series
          - '>=22.17.0 <22.18.0'   # TS module mocking sourcemap fix

          # Major: strip-types enabled by default in Node 22 LTS
          - '>=22.18.0 <22.20.0'   # unflagged / warning removed / amaro 1.1.0

          - '>=22.20.0 <22.21.0'   # amaro updates
          - '>=22.21.0 <23'        # amaro updates

          - '>=24.0.0 <24.1.0'     # Node 24 initial state; strip-types default-on / Stability: RC
          - '>=24.1.0 <24.3.0'     # amaro updates

          # Major: experimental warning removed in Node 24
          - '>=24.3.0 <24.5.0'     # warning removed / amaro 1.1.0 / CJS TS loader refactor

          - '>=24.5.0 <24.8.0'     # amaro updates
          - '>=24.8.0 <24.10.0'    # amaro updates
          - '>=24.10.0 <24.12.0'   # amaro updates

          # Major: type stripping marked Stable in Node 24 LTS
          - '24.12.0'              # exact boundary version where type stripping became stable
          - '>=24.12.0 <25'        # stable Node 24 range after 24.12.0

        # rolldown's native binding requires Node ^20.19 || >=22.12. For matrix
        # entries below that range, install + tsdown build run on a bootstrap
        # Node, and the matrix Node below exercises the resulting dist/ at
        # runtime (with e2e-cli's pretest hook bypassed). All other entries
        # use the simple flow: install / typecheck / test / build on the
        # matrix Node directly.
        include:
          - { node: '>=22.6.0 <22.7.0',  rolldownIncompat: true }
          - { node: '>=22.7.0 <22.8.0',  rolldownIncompat: true }
          - { node: '>=22.8.0 <22.9.0',  rolldownIncompat: true }
          - { node: '>=22.9.0 <22.10.0', rolldownIncompat: true }
          - { node: '>=22.10.0 <22.12.0', rolldownIncompat: true }

    steps:
      - uses: actions/checkout@v6

      # action-setup@v6 bootstrap-installs pnpm v11 (per its committed lockfile)
      # and only honours `packageManager` via pnpm's own `manage-package-manager
      # -versions`. Bootstrap pnpm v11 hard-errors on Node <22.13 unless it's
      # the @pnpm/exe (Node-bundled) build. The action auto-picks @pnpm/exe
      # when the *runner's preinstalled* Node is <22.13, which is true for
      # ubuntu-24.04 (Node 20.x) but NOT windows-2025 / macos-15 (Node 22.22).
      # Force @pnpm/exe everywhere so bootstrap pnpm runs on its bundled Node
      # regardless of the matrix Node we switch to next.
      #
      # Pinning `version: 10.33.2` instead doesn't work: action-setup compares
      # it against the full `pnpm@10.33.2+sha512.xxx` packageManager string
      # and refuses on mismatch (ERR_PNPM_BAD_PM_VERSION-style error).
      - uses: pnpm/action-setup@v6
        with:
          standalone: true

      # rolldown-incompatible path: install + tsdown build run here, on a
      # known-compatible Node. The matrix Node below then exercises dist/.
      - name: Setup bootstrap Node
        if: ${{ matrix.rolldownIncompat }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      # Turbo's local cache is at .turbo/cache. Keying on the commit SHA
      # always writes a fresh entry; restore-keys falls back to the most
      # recent prior cache for the same OS/node so unaffected task hashes
      # hit immediately. node version is part of the key because turbo's
      # hash currently does not factor it in, and we want to keep the
      # matrix entries from clobbering each other if that ever changes.
      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-node${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node }}-

      - name: Install (bootstrap Node)
        if: ${{ matrix.rolldownIncompat }}
        run: pnpm install

      - name: Build CLI dist (bootstrap Node)
        if: ${{ matrix.rolldownIncompat }}
        run: pnpm --filter create-arkor build && pnpm --filter arkor build

      - name: Setup matrix Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          # On the rolldown-incompatible path the bootstrap setup above
          # already restored the pnpm store, so skip cache here to avoid
          # a redundant post-job save.
          cache: ${{ !matrix.rolldownIncompat && 'pnpm' || '' }}

      - name: Print resolved Node version
        run: |
          node --version
          echo "**Resolved Node:** \`$(node --version)\` (matrix: \`${{ matrix.node }}\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        if: ${{ !matrix.rolldownIncompat }}
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      # e2e-cli's pretest hook rebuilds create-arkor with tsdown, which fails
      # on matrix Nodes below rolldown's supported range. Skip it in the turbo
      # run and invoke vitest directly so the dist/ produced by the bootstrap
      # step above is used as-is.
      - name: Test (rolldown-incompatible Node)
        if: ${{ matrix.rolldownIncompat }}
        env:
          ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC: file:${{ github.workspace }}/packages/arkor
        run: |
          pnpm exec turbo run test --filter='!@arkor/e2e-cli'
          pnpm --filter @arkor/e2e-cli exec vitest run

      - name: Test
        if: ${{ !matrix.rolldownIncompat }}
        env:
          ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC: file:${{ github.workspace }}/packages/arkor
        run: pnpm test

      - name: Build
        if: ${{ !matrix.rolldownIncompat }}
        run: pnpm build

  # Cross-pm install matrix: exercises `arkor init --use-<pm>` and
  # `create-arkor --use-<pm>` against every package manager the SDK accepts,
  # crossed with OS and a curated set of Node versions known to shift
  # spawn / pipe / strip-types behaviour (e.g. libuv 1.51 in Node 22.17
  # changed macOS pipe-flush timing — the kind of thing that ate hours of
  # debugging in eng-606). The build job above already runs `pnpm test`
  # end-to-end, but its install assertions only cover the pms that a
  # typical contributor has on PATH (npm + pnpm). The yarn / yarn-berry /
  # bun lanes pull their runtimes in CI-only because they aren't a
  # development prerequisite and we don't want `pnpm test` on a fresh
  # checkout to require them.
  #
  # Each runner sets `ARKOR_E2E_PM=<label>`; the e2e suites
  # (e2e/cli/src/{arkor-init,create-arkor}.test.ts) gate their install
  # cases on that env var so exactly one pm's install assertions run per
  # matrix entry. The rest of the e2e suite runs unfiltered — setup
  # (workspace install + CLI build + corepack/bun bootstrap) dominates
  # each job's wall time, so the marginal cost of running every e2e test
  # over the matrix pm/Node/OS triple is small and occasionally surfaces
  # cross-axis interactions outside the install path (e.g. yarn-berry's
  # PnP fs layout influencing scaffold or spawn assertions).
  install-matrix:
    name: install · ${{ matrix.id }} · ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Curated Node versions — boundaries where install-relevant
        # behaviour shifted, plus the live LTS lines. We deliberately
        # don't replicate the build matrix's full ~20-entry sweep here:
        # `<pm> install` itself isn't sensitive to strip-types / amaro
        # release-cadence, only to spawn / pipe / engine-check changes.
        node:
          - '>=22.13.0 <22.14.0'  # pnpm 11 engines floor; rolldown-compat
          - '>=22.17.0 <22.18.0'  # libuv 1.51: macOS pipe-flush, spawn behaviour
          - '>=22.21.0 <23'       # 22 LTS latest
          - '>=24.12.0 <25'       # 24 LTS, type stripping marked Stable
        id: [pnpm-9, pnpm-10, pnpm-11, npm, yarn, yarn-berry, bun]
        include:
          # Oldest-supported Node sanity, ubuntu only — the OS-specific
          # install bugs the matrix is designed to catch are independent
          # of Node version, so replicating Node 22.6 across all three
          # OSes would just bloat job count without surfacing distinct
          # failures. rolldownIncompat=true triggers the bootstrap-Node
          # pattern below: install + tsdown build run on Node 24 because
          # rolldown's native binding can't load on Node <22.12, then the
          # matrix Node exercises the resulting dist/.
          # pnpm-11 is intentionally omitted — its engines field requires
          # Node ≥22.13 and the runtime hard-errors on older minors.
          - { os: ubuntu-latest, node: '>=22.6.0 <22.7.0', id: pnpm-9,     rolldownIncompat: true }
          - { os: ubuntu-latest, node: '>=22.6.0 <22.7.0', id: pnpm-10,    rolldownIncompat: true }
          - { os: ubuntu-latest, node: '>=22.6.0 <22.7.0', id: npm,        rolldownIncompat: true }
          - { os: ubuntu-latest, node: '>=22.6.0 <22.7.0', id: yarn,       rolldownIncompat: true }
          - { os: ubuntu-latest, node: '>=22.6.0 <22.7.0', id: yarn-berry, rolldownIncompat: true }
          - { os: ubuntu-latest, node: '>=22.6.0 <22.7.0', id: bun,        rolldownIncompat: true }
    steps:
      - uses: actions/checkout@v6

      # rolldownIncompat path: install + tsdown build run on a known-good
      # bootstrap Node 24 first; the matrix Node below then takes over for
      # the actual install assertion.
      - name: Setup bootstrap Node
        if: ${{ matrix.rolldownIncompat }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable corepack (bootstrap)
        if: ${{ matrix.rolldownIncompat }}
        run: |
          # Older Node minors (notably 22.13.x) ship a corepack with stale
          # npm-registry signing keys that fail `verifySignature` on every
          # `pnpm install` after the upstream key rotation. Upgrade
          # corepack itself to latest before enabling so keys match.
          # Latest Node 24 already includes a fresh corepack but the
          # upgrade is cheap and a no-op when already current.
          npm install -g corepack@latest
          corepack enable
          echo "COREPACK_ENABLE_DOWNLOAD_PROMPT=0" >> "$GITHUB_ENV"

      - name: Install workspace + build CLIs (bootstrap)
        if: ${{ matrix.rolldownIncompat }}
        run: |
          pnpm install
          pnpm --filter create-arkor build
          pnpm --filter arkor build

      - name: Setup matrix Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          # Intentionally no `cache: pnpm` — at this point pnpm isn't on
          # PATH yet (the install-matrix job uses Node's bundled corepack
          # to provision pnpm in the *next* step instead of running
          # `pnpm/action-setup` up-front), so setup-node's pnpm-aware
          # cache lookup fails with `Unable to locate executable file:
          # pnpm`. Each job re-fetches deps fresh; ~30 s/job extra is
          # noise next to the 2–3 min setup cost, and skipping the cache
          # avoids a class of cross-OS pitfalls (e.g. corepack writing
          # shims into a system-owned bin dir on Windows).

      # We deliberately use Node's bundled corepack instead of
      # pnpm/action-setup. action-setup adds its pnpm to PATH in a way
      # that shadows corepack's shim, which would defeat the matrix
      # --activate below: every entry would end up running action-setup's
      # pinned pnpm regardless of which version we asked corepack to
      # activate. Workspace `pnpm install` still resolves to pnpm 10.33.2
      # because corepack reads `packageManager` from the root
      # package.json; only the matrix pm test runs in tmpdirs (no
      # packageManager field there), so corepack falls back to the
      # activated default.
      - name: Enable corepack (matrix)
        run: |
          # Same signing-key story as the bootstrap step above — Node
          # 22.13.x (and likely a few other minors in this matrix) ships
          # a corepack predating the npm-registry key rotation, so a
          # plain `corepack enable` followed by `pnpm install` blows up
          # in `verifySignature`. Upgrade first.
          npm install -g corepack@latest
          corepack enable
          echo "COREPACK_ENABLE_DOWNLOAD_PROMPT=0" >> "$GITHUB_ENV"

      - name: Install workspace + build CLIs (non-rolldownIncompat)
        if: ${{ !matrix.rolldownIncompat }}
        run: |
          pnpm install
          pnpm --filter create-arkor build
          pnpm --filter arkor build

      - name: Setup pm under test (${{ matrix.id }})
        if: ${{ matrix.id != 'bun' }}
        run: |
          case "${{ matrix.id }}" in
            pnpm-9)     corepack prepare "pnpm@9.15.9"   --activate ;;
            pnpm-10)    corepack prepare "pnpm@10.33.2"  --activate ;;
            pnpm-11)    corepack prepare "pnpm@11.0.3"   --activate ;;
            npm)        echo "Using bundled npm $(npm --version)" ;;
            yarn)       corepack prepare "yarn@1.22.22"  --activate ;;
            # yarn classic and berry both use the `yarn` npm package;
            # only the version line differs (1.x vs 4.x).
            yarn-berry) corepack prepare "yarn@4.14.1"   --activate ;;
          esac

      # bun isn't on corepack's package list and its official `curl |
      # bash` installer is POSIX-only, so on Windows it'd silently no-op.
      # `oven-sh/setup-bun` handles all three OSes uniformly and adds
      # bun to PATH via $GITHUB_PATH for us.
      - name: Setup bun
        if: ${{ matrix.id == 'bun' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Confirm pm version
        run: |
          case "${{ matrix.id }}" in
            pnpm-*)         pnpm --version ;;
            npm)            npm --version ;;
            yarn|yarn-berry) yarn --version ;;
            bun)            bun --version ;;
          esac

      - name: Run e2e suite under matrix pm
        env:
          ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC: file:${{ github.workspace }}/packages/arkor
        run: |
          # Derive the e2e install-test gate label from the matrix id.
          # yarn-berry and the pnpm-N entries share a common label across
          # versions because the test only cares about which
          # `--use-<flag>` to pass — the binary version is selected by
          # corepack/setup-bun above.
          case "${{ matrix.id }}" in
            pnpm-*)     PM_LABEL=pnpm ;;
            yarn-berry) PM_LABEL=yarn-berry ;;
            *)          PM_LABEL="${{ matrix.id }}" ;;
          esac
          # We deliberately don't `-t`-filter to "real <pm> install" —
          # setup (workspace install + CLI build + corepack/bun) is the
          # bulk of each job's wall time, so dropping the filter to run
          # the full e2e suite is ~30 s/job extra and surfaces any
          # cross-axis interactions we didn't anticipate (e.g. yarn-berry
          # PnP affecting unrelated spawn paths). The install cases
          # themselves are still pm-gated via `ARKOR_E2E_PM` so only one
          # pm's install assertions run per job.
          ARKOR_E2E_PM="$PM_LABEL" pnpm --filter @arkor/e2e-cli exec vitest run

  coverage:
    name: coverage · upload to Codecov
    runs-on: ubuntu-latest
    # The matrix above already exercises tests across Node versions; this
    # job runs once on the newest LTS to keep coverage + Test Analytics
    # uploads stable. Codecov uploads use OIDC (`use_oidc: true`) — no
    # CODECOV_TOKEN secret is stored in this repo. `id-token: write` is
    # required for the runner to mint the OIDC JWT that codecov-action
    # exchanges for an upload token. See
    # https://docs.codecov.com/docs/github-tokenless-uploads.
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # Same reason as the build job — see comment there.
      - uses: pnpm/action-setup@v6
        with:
          standalone: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-coverage-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-coverage-

      - name: Install
        run: pnpm install

      # Tests must keep going on failure so every package still produces
      # its lcov.info / junit.xml; turbo's default `--continue=never` would
      # cancel sibling tasks after the first failure and starve the upload
      # steps below. Subsequent uploads gate on `!cancelled()` so they run
      # even when tests fail; the job's final outcome still reflects the
      # test result.
      - name: Test with coverage
        env:
          ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC: file:${{ github.workspace }}/packages/arkor
        run: pnpm exec turbo run test:coverage --continue

      - name: Upload arkor coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/arkor/coverage/lcov.info
          flags: arkor
          fail_ci_if_error: false

      - name: Upload create-arkor coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/create-arkor/coverage/lcov.info
          flags: create-arkor
          fail_ci_if_error: false

      - name: Upload cli-internal coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/cli-internal/coverage/lcov.info
          flags: cli-internal
          fail_ci_if_error: false

      - name: Upload studio-app coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/studio-app/coverage/lcov.info
          flags: studio-app
          fail_ci_if_error: false

      # E2E coverage is collected via c8 wrapping vitest in e2e/cli; the
      # spawned CLI children inherit NODE_V8_COVERAGE and their hits are
      # remapped through tsdown's sourcemaps back into
      # packages/{arkor,create-arkor}/src/**.
      - name: Upload e2e-cli coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./e2e/cli/coverage/lcov.info
          flags: e2e-cli
          fail_ci_if_error: false

      # Codecov Test Analytics — uploads JUnit XML produced by the vitest
      # `junit` reporter. Tracks pass/fail history per test, surfaces flaky
      # tests, and shows failure trends on the Codecov dashboard. See
      # https://docs.codecov.com/docs/test-analytics.
      - name: Upload arkor test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/arkor/coverage/junit.xml
          flags: arkor
          fail_ci_if_error: false

      - name: Upload create-arkor test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/create-arkor/coverage/junit.xml
          flags: create-arkor
          fail_ci_if_error: false

      - name: Upload cli-internal test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/cli-internal/coverage/junit.xml
          flags: cli-internal
          fail_ci_if_error: false

      - name: Upload studio-app test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/studio-app/coverage/junit.xml
          flags: studio-app
          fail_ci_if_error: false

      - name: Upload e2e-cli test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./e2e/cli/coverage/junit.xml
          flags: e2e-cli
          fail_ci_if_error: false
