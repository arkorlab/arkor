name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: typecheck · test · build · node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # This matrix intentionally covers Node.js versions where built-in
        # TypeScript execution was experimental, so we can verify behavioral
        # differences across strip-types / transform-types / amaro changes.
        node:
          # Major: introduced --experimental-strip-types
          - '>=22.6.0 <22.7.0'     # .ts type stripping becomes available

          # Major: introduced --experimental-transform-types
          - '>=22.7.0 <22.8.0'     # supports TS syntax that requires transforms, such as enum

          - '>=22.8.0 <22.9.0'     # sourceURL / transform-related changes
          - '>=22.9.0 <22.10.0'    # amaro made externalizable
          - '>=22.10.0 <22.12.0'   # process.features.typescript / TS test runner changes
          - '>=22.12.0 <22.13.0'   # amaro updates
          - '>=22.13.0 <22.14.0'   # added module.stripTypeScriptTypes

          # Major: TypeScript support for eval / worker input and error classification
          - '>=22.14.0 <22.15.0'   # STDIN eval / worker eval TS input / ERR_UNSUPPORTED_TYPESCRIPT_SYNTAX

          - '>=22.15.0 <22.17.0'   # amaro update series
          - '>=22.17.0 <22.18.0'   # TS module mocking sourcemap fix

          # Major: strip-types enabled by default in Node 22 LTS
          - '>=22.18.0 <22.20.0'   # unflagged / warning removed / amaro 1.1.0

          - '>=22.20.0 <22.21.0'   # amaro updates
          - '>=22.21.0 <23'        # amaro updates

          - '>=24.0.0 <24.1.0'     # Node 24 initial state; strip-types default-on / Stability: RC
          - '>=24.1.0 <24.3.0'     # amaro updates

          # Major: experimental warning removed in Node 24
          - '>=24.3.0 <24.5.0'     # warning removed / amaro 1.1.0 / CJS TS loader refactor

          - '>=24.5.0 <24.8.0'     # amaro updates
          - '>=24.8.0 <24.10.0'    # amaro updates
          - '>=24.10.0 <24.12.0'   # amaro updates

          # Major: type stripping marked Stable in Node 24 LTS
          - '24.12.0'              # exact boundary version where type stripping became stable
          - '>=24.12.0 <25'        # stable Node 24 range after 24.12.0

        # rolldown's native binding requires Node ^20.19 || >=22.12. For matrix
        # entries below that range, install + tsdown build run on a bootstrap
        # Node, and the matrix Node below exercises the resulting dist/ at
        # runtime (with e2e-cli's pretest hook bypassed). All other entries
        # use the simple flow: install / typecheck / test / build on the
        # matrix Node directly.
        include:
          - { node: '>=22.6.0 <22.7.0',  rolldownIncompat: true }
          - { node: '>=22.7.0 <22.8.0',  rolldownIncompat: true }
          - { node: '>=22.8.0 <22.9.0',  rolldownIncompat: true }
          - { node: '>=22.9.0 <22.10.0', rolldownIncompat: true }
          - { node: '>=22.10.0 <22.12.0', rolldownIncompat: true }

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      # rolldown-incompatible path: install + tsdown build run here, on a
      # known-compatible Node. The matrix Node below then exercises dist/.
      - name: Setup bootstrap Node
        if: ${{ matrix.rolldownIncompat }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      # Turbo's local cache is at .turbo/cache. Keying on the commit SHA
      # always writes a fresh entry; restore-keys falls back to the most
      # recent prior cache for the same OS/node so unaffected task hashes
      # hit immediately. node version is part of the key because turbo's
      # hash currently does not factor it in, and we want to keep the
      # matrix entries from clobbering each other if that ever changes.
      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-node${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node }}-

      - name: Install (bootstrap Node)
        if: ${{ matrix.rolldownIncompat }}
        run: pnpm install

      - name: Build CLI dist (bootstrap Node)
        if: ${{ matrix.rolldownIncompat }}
        run: pnpm --filter create-arkor build && pnpm --filter arkor build

      - name: Setup matrix Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          # On the rolldown-incompatible path the bootstrap setup above
          # already restored the pnpm store, so skip cache here to avoid
          # a redundant post-job save.
          cache: ${{ !matrix.rolldownIncompat && 'pnpm' || '' }}

      - name: Print resolved Node version
        run: |
          node --version
          echo "**Resolved Node:** \`$(node --version)\` (matrix: \`${{ matrix.node }}\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        if: ${{ !matrix.rolldownIncompat }}
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      # e2e-cli's pretest hook rebuilds create-arkor with tsdown, which fails
      # on matrix Nodes below rolldown's supported range. Skip it in the turbo
      # run and invoke vitest directly so the dist/ produced by the bootstrap
      # step above is used as-is.
      - name: Test (rolldown-incompatible Node)
        if: ${{ matrix.rolldownIncompat }}
        env:
          ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC: file:${{ github.workspace }}/packages/arkor
        run: |
          pnpm exec turbo run test --filter='!@arkor/e2e-cli'
          pnpm --filter @arkor/e2e-cli exec vitest run

      - name: Test
        if: ${{ !matrix.rolldownIncompat }}
        env:
          ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC: file:${{ github.workspace }}/packages/arkor
        run: pnpm test

      - name: Build
        if: ${{ !matrix.rolldownIncompat }}
        run: pnpm build

  coverage:
    name: coverage · upload to Codecov
    runs-on: ubuntu-latest
    # The matrix above already exercises tests across Node versions; this
    # job runs once on the newest LTS to keep coverage + Test Analytics
    # uploads stable. Codecov uploads use OIDC (`use_oidc: true`) — no
    # CODECOV_TOKEN secret is stored in this repo. `id-token: write` is
    # required for the runner to mint the OIDC JWT that codecov-action
    # exchanges for an upload token. See
    # https://docs.codecov.com/docs/github-tokenless-uploads.
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-coverage-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-coverage-

      - name: Install
        run: pnpm install

      # Tests must keep going on failure so every package still produces
      # its lcov.info / junit.xml; turbo's default `--continue=never` would
      # cancel sibling tasks after the first failure and starve the upload
      # steps below. Subsequent uploads gate on `!cancelled()` so they run
      # even when tests fail; the job's final outcome still reflects the
      # test result.
      - name: Test with coverage
        env:
          ARKOR_INTERNAL_SCAFFOLD_ARKOR_SPEC: file:${{ github.workspace }}/packages/arkor
        run: pnpm exec turbo run test:coverage --continue

      - name: Upload arkor coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/arkor/coverage/lcov.info
          flags: arkor
          fail_ci_if_error: false

      - name: Upload create-arkor coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/create-arkor/coverage/lcov.info
          flags: create-arkor
          fail_ci_if_error: false

      - name: Upload cli-internal coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/cli-internal/coverage/lcov.info
          flags: cli-internal
          fail_ci_if_error: false

      - name: Upload studio-app coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./packages/studio-app/coverage/lcov.info
          flags: studio-app
          fail_ci_if_error: false

      # E2E coverage is collected via c8 wrapping vitest in e2e/cli; the
      # spawned CLI children inherit NODE_V8_COVERAGE and their hits are
      # remapped through tsdown's sourcemaps back into
      # packages/{arkor,create-arkor}/src/**.
      - name: Upload e2e-cli coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: ./e2e/cli/coverage/lcov.info
          flags: e2e-cli
          fail_ci_if_error: false

      # Codecov Test Analytics — uploads JUnit XML produced by the vitest
      # `junit` reporter. Tracks pass/fail history per test, surfaces flaky
      # tests, and shows failure trends on the Codecov dashboard. See
      # https://docs.codecov.com/docs/test-analytics.
      - name: Upload arkor test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/arkor/coverage/junit.xml
          flags: arkor
          fail_ci_if_error: false

      - name: Upload create-arkor test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/create-arkor/coverage/junit.xml
          flags: create-arkor
          fail_ci_if_error: false

      - name: Upload cli-internal test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/cli-internal/coverage/junit.xml
          flags: cli-internal
          fail_ci_if_error: false

      - name: Upload studio-app test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./packages/studio-app/coverage/junit.xml
          flags: studio-app
          fail_ci_if_error: false

      - name: Upload e2e-cli test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          report_type: test_results
          files: ./e2e/cli/coverage/junit.xml
          flags: e2e-cli
          fail_ci_if_error: false
