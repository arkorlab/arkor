name: Build (reusable)

# SLSA Build L3 trusted builder.
#
# Scope (intentionally minimal): install → build → pack → attest → publish.
# Everything that is not strictly required to produce and sign the
# artifact lives in the caller — tests (which execute arbitrary
# user-controlled code), tag-shape validation, version reconciliation
# against package.json, the npm-not-yet-published guard, and the dry-run
# verification path. Keeping those out of the reusable workflow shrinks
# the trust boundary that downstream verifiers pin via the OIDC
# `job_workflow_ref` claim, so a compromise of caller-side checks cannot
# leak into the publish identity.
#
# The npm provenance attached by `pnpm publish --provenance` is signed via
# Sigstore using this job's GitHub OIDC token, whose `job_workflow_ref`
# claim resolves to this file's path + ref. Verifiers (e.g.
# `npm audit signatures`, slsa-verifier) can therefore require provenance
# signed by this exact reusable workflow as a separately-lockable trust
# principal — branch-protect this file and the publish identity is safe
# even if a caller workflow is compromised.

on:
  workflow_call:
    inputs:
      npm_tag:
        description: "Resolved npm dist-tag."
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      attestations: write

    environment: npm-publish

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      # No `cache: pnpm`. This is the SLSA L3 trusted builder: a pnpm
      # store restored from a prior run's cache (this is what
      # setup-node's `cache: pnpm` integration does via actions/cache)
      # is an unauthenticated input that would feed straight into the
      # dist/ shape we then pack, attest, and `pnpm publish
      # --provenance`. The provenance signed under this workflow's
      # OIDC identity must only reflect inputs the caller's
      # source-level checks have actually validated, so install must
      # fetch from the npm registry on every run with no cache
      # restore in between (pnpm's own in-job store is still used; it
      # just starts empty).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          ARKOR_POSTHOG_KEY: ${{ secrets.ARKOR_POSTHOG_KEY }}
          ARKOR_POSTHOG_HOST: ${{ secrets.ARKOR_POSTHOG_HOST }}
        run: pnpm run build

      - name: Pack release tarballs
        run: |
          PACK_DIR="$RUNNER_TEMP/npm-pack"
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"

          for PKG_DIR in packages/arkor packages/create-arkor; do
            (cd "$PKG_DIR" && pnpm pack --pack-destination "$PACK_DIR")
          done

      - name: Generate GitHub artifact attestations for release tarballs
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ runner.temp }}/npm-pack/*.tgz

      # Publish from the package directory with `pnpm publish`. pnpm 11's
      # native publish (it no longer shells out to the npm CLI) honors the
      # workspace-level `embedReadme: true` in pnpm-workspace.yaml, so
      # README.md is embedded into the registry packument's `readme` field
      # and the npmjs.com page renders; that is the job this step used to
      # delegate to `npm publish` for. Authentication is npm Trusted Publishing
      # (OIDC): no NPM_TOKEN is set, and the publish-side OIDC fixes
      # (pnpm/pnpm#11495, #11518, #11513) landed by pnpm 11.1.3, so any
      # pnpm >= 11.1.3 treats the `_authToken=${NODE_AUTH_TOKEN}` placeholder
      # that setup-node writes into `.npmrc` as empty and uses OIDC instead
      # of sending the literal placeholder as a bearer token. (This repo
      # pins pnpm 11.3.0 via package.json's `packageManager`, well above
      # that floor.)
      # `--no-git-checks` skips pnpm's publish-branch / clean-tree
      # assertions, which don't apply on the detached-tag checkout this
      # builder runs against.
      - name: Publish arkor to npm
        working-directory: packages/arkor
        run: |
          pnpm publish \
            --access public \
            --tag "${{ inputs.npm_tag }}" \
            --no-git-checks \
            --provenance

      - name: Publish create-arkor to npm
        working-directory: packages/create-arkor
        run: |
          pnpm publish \
            --access public \
            --tag "${{ inputs.npm_tag }}" \
            --no-git-checks \
            --provenance

      - name: Upload release tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarballs
          path: ${{ runner.temp }}/npm-pack/*.tgz
          retention-days: 1
          if-no-files-found: error
